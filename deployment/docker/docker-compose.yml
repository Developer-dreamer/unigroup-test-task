name: unigroup-test-task

services:
  api:
    build:
      context: ../../
      dockerfile: deployment/docker/Dockerfile
      args:
        SERVICE_PATH: cmd/api
    container_name: api
    ports:
      - "8080:8080"
    env_file:
      - ../../.api_env
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification:
    build:
      context: ../../
      dockerfile: deployment/docker/Dockerfile
      args:
        SERVICE_PATH: cmd/notification
    container_name: notification
    env_file:
      - ../../.notif_env
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: products_db
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: [ "redis-server", "--appendonly", "yes" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres-data:
  redis-data:

networks:
  app-network:
    driver: bridge